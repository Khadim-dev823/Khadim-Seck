<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'inscription</title>
</head>

<body>
    <nav>
        <a href="index.html">Accueil</a>
    </nav>
    <form action="#" method="get">
        <fieldset>
            <legend>Identité</legend>
            <label for="nom">Nom:</label> <br>
            <input type="text" id="nom" name="nom" required maxlength="50"> <br> <br>
            <label for="prenom">Prénom:</label> <br>
            <input type="text" id="prenom" name="prenom" required maxlength="50"> <br> <br>
            <input type="radio" id="masculin" name="sexe" value="masculin" required>
            <label for="masculin">Masculin</label>
            <input type="radio" id="feminin" name="sexe" value="feminin" required>
            <label for="feminin">Féminin</label> <br> <br>
            <label for="date_naissance">Date de naissance:</label> <br>
            <input type="date" id="date_naissance" name="date_naissance" required max="2006-12-31"> <br> <br>
            <label for="nationalite">Nationalité:</label> <br>
            <select id="nationalite" name="nationalite" required>
                <option value="senegal">Sénégal</option>
                <option value="france">France</option>
                <option value="espagne">Espagne</option>
                <option value="italie">Ghana</option>
                <option value="allemagne">Gambie</option>
                <option value="maroc">Maroc</option>
            </select> <br> <br>
        </fieldset> <br> <br>
        <fieldset>
            <legend>Contact</legend>
            <label for="email">Adresse email:</label> <br>
            <input type="email" id="email" name="email" required> <br> <br>
            <label for="confirm_email">Confirmation email:</label> <br>
            <input type="email" id="confirm_email" name="confirm_email" required placeholder="Confirmez votre email">
            <br> <br>
            <label for="telephone">Numéro de téléphone:</label> <br>
            <input type="tel" id="telephone" name="telephone" pattern="[0-9]{9}"
                title="Veuillez entrer un numéro de téléphone à 9 chiffres sans espaces ni tirets." required> <br> <br>
            <label for="ville">Ville de résidence:</label> <br>
            <input list="villes" id="ville" name="ville" required>
            <datalist id="villes">
                <option value="Dakar">
                <option value="Thiès">
                <option value="Saint-Louis">
                <option value="Kaolack">
                <option value="Ziguinchor">
                <option value="Touba">
            </datalist> <br> <br>
        </fieldset> <br> <br>
        <fieldset>
            <legend>Compte et préférences</legend>
            <label for="password">Mot de passe:</label> <br>
            <input type="password" id="password" name="password" minlength="8" maxlength="30" required> <br> <br>
            <label for="confirm_password">Confirmation mot de passe:</label> <br>
            <input type="password" id="confirm_password" name="confirm_password" minlength="8" maxlength="30" required> <br> <br>
            <label>Langages connus:</label> <br>
            <input type="checkbox" id="html" name="langages" value="HTML">
            <label for="html">HTML</label> <br>
            <input type="checkbox" id="css" name="langages" value="CSS">
            <label for="css">CSS</label> <br>
            <input type="checkbox" id="javascript" name="langages" value="JavaScript">
            <label for="javascript">JavaScript</label> <br>
            <input type="checkbox" id="python" name="langages" value="Python">
            <label for="python">Python</label> <br>
            <input type="checkbox" id="php" name="langages" value="PHP">
            <label for="php">PHP</label> <br> <br>
            <label for="niveau">Niveau d'expérience:</label> <br>
            <input type="range" id="niveau" name="niveau" min="0" max="5" value="1"> <br> <br>
            <label for="Photo de profil">Photo de profil:</label> <br>
            <input type="file" id="Photo de profil" name="Photo de profil" accept="image/*"> <br> <br>
            <label for="Bio courte">Bio courte:</label> <br>
            <textarea rows="4" maxlength="300" placeholder="Votre biographie courte..."></textarea> <br> <br>
            <input type="checkbox" id="conditions" name="conditions" required>
            <label for="conditions">J'accepte les conditions d'utilisation</label> <br> <br>
            <input type="submit" value="Créer mon compte">
            <input type="reset" value="Effacer">
        </fieldset> 
    </form>
</body>

</html>
