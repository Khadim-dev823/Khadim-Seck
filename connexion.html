<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de connexion</title>
</head>
<body>
    <nav>
        <a href="index.html">Accueil</a>
    </nav>
    <form action="#" method="post"> <legend>Connexion à votre espace</legend>
        <fieldset>
            <legend>Authentification</legend>
            <label for="email">Adresse email:</label> <br>
            <input type="email" id="email" name="email" required autofocus> <br> <br>
            <label for="mot_de_passe">Mot de passe:</label> <br>
            <input type="password" id="mot_de_passe" name="mot_de_passe" required minlength="8"> <br> 
            <input type="checkbox" id="souvenir" name="souvenir">
            <label for="souvenir">Se souvenir de moi</label> <br> <br>
            <input type="submit" value="Se connecter"> <br> <br>
            <a href="#">Mot de passe oublié?</a>
        </fieldset>
    </form>
</body>
</html>
