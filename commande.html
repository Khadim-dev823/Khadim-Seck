<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de commande</title>
</head>

<body>
    <nav>
        <a href="index.html">Accueil</a>
    <nav>
    <form action="#" method="get"></form>
    <fieldset>
        <legend>Votre commande</legend>
        <label for="produit">Produit :</label>
        <select id="produit" name="produit" required>
            <option value="ordinateur_portable">Ordinateur portable</option>
            <option value="souris">Souris</option>
            <option value="clavier">Clavier</option>
            <option value="webcam">Webcam</option>
            <option value="casque">Casque</option>
        </select> <br> <br>
        <label for="quantite">Quantité :</label>
        <input type="number" id="quantite" name="quantite" min="1" max="10" value="1" required> <br> <br>
        <label for="couleur">Couleur préférée du produit :</label>
        <input type="color" id="couleur" name="couleur" value="#000000"> <br> <br>
        <label for="date_livraison">Date de livraison souhaitée :</label>
        <input type="date" id="date_livraison" name="date_livraison" min="20/06/2026" required> <br> <br>
        <label for="heure_livraison">Heure de livraison souhaitée :</label>
        <input type="time" id="heure_livraison" name="heure_livraison" min="08:00" max="18:00" step="1800" required>
        <br> <br>
        <input type="submit" value="Passer la commande">
    </fieldset> <br> <br>
    <fieldset>
        <legend>Livraison</legend>
        <label for="mode_livraison">Mode de livraison :</label> <br>
        <input type="radio" id="domicile" name="mode_livraison" value="domicile" required>
        <label for="domicile">Domicile</label> <br>
        <input type="radio" id="point_relais" name="mode_livraison" value="point_relais" required>
        <label for="point_relais">Point relais</label> <br>
        <input type="radio" id="retrait_magasin" name="mode_livraison" value="retrait_magasin" required>
        <label for="retrait_magasin">Retrait en magasin</label> <br> <br>

        <label for="adresse">Adresse complète :</label> <br>
        <textarea id="adresse" name="adresse" rows="3" required></textarea> <br> <br>

        <label for="code_postal">Code postal :</label> <br>
        <input type="text" id="code_postal" name="code_postal" pattern="[0-9]{5}" title="5 chiffres" required> <br> <br>

        <label for="ville">Ville :</label> <br>
        <input type="text" id="ville" name="ville" list="villes">
        <datalist id="villes">
            <option value="Dakar">
            <option value="Thiès">
            <option value="Saint-Louis">
            <option value="Kaolack">
            <option value="Ziguinchor">
        </datalist> <br> <br>
    </fieldset> <br> <br>
    <fieldset>
        <legend>Paiement</legend>
        <label for="moyen_paiement">Moyen de paiement :</label> <br>
        <select id="moyen_paiement" name="moyen_paiement" required>
            <option value="carte_bancaire">Carte bancaire</option>
            <option value="wave">Wave</option>
            <option value="orange_money">Orange Money</option>
            <option value="paypal">PayPal</option>
            <option value="virement">Virement</option>
        </select> <br> <br>
        <label for="telephone_mobile">Numéro de téléphone mobile money (si applicable) :</label> <br>
        <input type="tel" id="telephone_mobile" name="telephone_mobile" pattern="[0-9]{9}" title="9 chiffres" required> <br> <br>
        <input type="checkbox" id="confirme_commande" name="confirme_commande" required>
        <label for="confirme_commande">Je confirme ma commande et accepte les CGV</label> <br> <br>
        <input type="submit" value="Passer la commande">
    </fieldset>
</body>
</html>
